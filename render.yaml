services:
  - type: web
    name: aml-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: aml-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aml-redis
          property: connectionString
      - key: MODEL_S3_URI
        sync: false
      - key: AWS_REGION
        value: ap-northeast-1
      - key: AWS_DEFAULT_REGION
        value: ap-northeast-1

  - type: static
    name: aml-frontend
    rootDir: aml-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  - type: redis
    name: aml-redis
    plan: free
    ipAllowList: []

databases:
  - name: aml-postgres
    plan: free
